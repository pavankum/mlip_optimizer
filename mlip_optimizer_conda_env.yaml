name: mlip_optimizer
channels:
  - conda-forge
  - conda-forge/label/openmm_rc
  - openeye
  - nodefaults
dependencies:
  # Python
  - python

  # Core scientific libraries
  - numpy
  - pyarrow
  - rdkit
  - ase

  # OpenMM and force fields
  - openmm >=8.5.0rc1
  - openmmforcefields
  - openff-toolkit
  - openff-forcefields
  - openff-qcsubmit
  - openeye-toolkits
  - cmiles
  - qcfractal

  # Machine learning potentials
  - torchmd-net
  - triton

  # Code quality
  - black
  - isort
  - flake8

  # Utilities
  - tqdm
  - click
  - tabulate
  - cairosvg

  # Notebook and visualization
  - jupyter
  - marimo

  # Package management
  - pip

  - pip:
      # Machine learning potentials (pip-only)
      - mace-torch
      - git+https://github.com/openmm/openmm-ml.git@main
      - git+https://github.com/openforcefield/yammbs.git@main
      - aimnet
      - huggingface_hub
      - fennol
      - cuequivariance-torch
      - cuequivariance-jax
      - jaxlib[cuda13]
